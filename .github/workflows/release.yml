name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional, defaults to "Amethyst v<version>")'
        required: false
        type: string
      release_notes:
        description: 'Release notes / changelog (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            task: packageReleaseNsis
            artifact-dir: nsis
            artifact-ext: exe
            artifact-name: amethyst-windows

          - os: macos-26
            name: macOS ARM
            task: packageReleaseDmg
            artifact-dir: dmg
            artifact-ext: dmg
            artifact-name: amethyst-macos-arm

          - os: macos-15-intel
            name: macOS Intel
            task: packageReleaseDmg
            artifact-dir: dmg
            artifact-ext: dmg
            artifact-name: amethyst-macos-intel

          - os: ubuntu-latest
            name: Linux DEB
            task: packageReleaseDeb
            artifact-dir: deb
            artifact-ext: deb
            artifact-name: amethyst-linux-deb

          - os: ubuntu-latest
            name: Linux AppImage
            task: packageReleaseAppImage
            artifact-dir: app
            artifact-ext: AppImage
            artifact-name: amethyst-linux-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch ML Graphics
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.ML_GRAPHICS_REPOSITORY }}
          token: ${{ secrets.ML_GRAPHICS_TOKEN }}
          path: ml3-graphics
          sparse-checkout: devices

      - name: Copy ML Graphics
        shell: bash
        run: mkdir -p composeApp/src/commonMain/composeResources/files && cp -r ml3-graphics/. composeApp/src/commonMain/composeResources/files/

      - name: Setup Nucleus
        uses: kdroidFilter/Nucleus/.github/actions/setup-nucleus@main
        with:
          packaging-tools: 'true'
          setup-gradle: 'true'
          setup-node: 'true'

      - name: Build
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:${{ matrix.task }}

      - name: Rename artifact
        shell: bash
        run: |
          for f in composeApp/build/compose/binaries/main-release/${{ matrix.artifact-dir }}/*.${{ matrix.artifact-ext }}; do
            mv "$f" "composeApp/build/compose/binaries/main-release/${{ matrix.artifact-dir }}/${{ matrix.artifact-name }}-${{ inputs.version }}.${{ matrix.artifact-ext }}"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.artifact-name }}
          path: composeApp/build/compose/binaries/main-release/${{ matrix.artifact-dir }}/*.${{ matrix.artifact-ext }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-assets-*

      - name: Generate update YML
        uses: kdroidFilter/Nucleus/.github/actions/generate-update-yml@main
        with:
          artifacts-path: release-artifacts
          version: ${{ inputs.version }}
          channel: latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.release_name || format('Amethyst v{0}', inputs.version) }}
          body: |
            ${{ inputs.release_notes }}

            **Build #${{ github.run_number }}** · Commit: `${{ github.sha }}` · @${{ github.actor }}
          files: |
            release-artifacts/release-assets-amethyst-windows/*.exe
            release-artifacts/release-assets-amethyst-macos-arm/*.dmg
            release-artifacts/release-assets-amethyst-macos-intel/*.dmg
            release-artifacts/release-assets-amethyst-linux-deb/*.deb
            release-artifacts/release-assets-amethyst-linux-appimage/*.AppImage
            update-*.yml
          fail_on_unmatched_files: false
