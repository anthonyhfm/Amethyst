name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.5.0)'
        required: true
        type: string
      release_name:
        description: 'Release title (optional, defaults to "Amethyst v<version>")'
        required: false
        type: string
      release_notes:
        description: 'Release notes / changelog (optional)'
        required: false
        type: string

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-windows-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-windows-

      - name: Build MSI
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageMsi

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-windows
          path: composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  build-macos:
    name: Build (macOS Apple Silicon)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-macos-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-

      - name: Build DMG
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageDmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-macos
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-linux-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-linux-

      - name: Build DEB
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew :composeApp:packageDeb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-linux
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.release_name || format('Amethyst v{0}', inputs.version) }}
          body: |
            ${{ inputs.release_notes }}

            **Build #${{ github.run_number }}** · Commit: `${{ github.sha }}` · @${{ github.actor }}
          files: |
            release-artifacts/amethyst-windows/*.msi
            release-artifacts/amethyst-macos/*.dmg
            release-artifacts/amethyst-linux/*.deb
          fail_on_unmatched_files: true
